<!doctype html>
<html lang="en" data-theme="yasasvi-theme" x-data="{ darkMode: true }"
  :data-theme="darkMode ? 'yasasvi-theme' : 'light'">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Yasasvi Gumma | Software Engineer</title>

  <link rel="icon" href="/assets/img/favicon-small.webp" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:wght@300;600;800&family=JetBrains+Mono:wght@100;300;400&display=swap"
    rel="stylesheet" />

  <link rel="stylesheet"
    href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,300,0,0" />

  <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.14.8/dist/cdn.min.js"></script>

  <style>
    :root {
      font-family: "Bricolage Grotesque", sans-serif;
      --font-mono: "JetBrains Mono", monospace;
    }

    [data-theme="yasasvi-theme"] {
      color-scheme: "dark";
      --color-base-100: #0a0c10;
      --color-base-content: #f8fafc;
      --color-primary: #43fa96;
      --color-neutral: #161b22;
    }

    [data-theme="light"] {
      color-scheme: "light";
      --color-base-100: #ffffff;
      --color-base-content: #1e293b;
      --color-primary: #2563eb;
      --color-neutral: #f1f5f9;
    }

    body {
      background-color: var(--color-base-100);
      background-image: url("data:image/svg+xml,%3Csvg width='100' height='100' viewBox='0 0 100 100' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M50 30 L70 70 L30 70 Z' fill='none' stroke='%2343fa96' stroke-width='0.4' stroke-opacity='0.15' transform='rotate(45 50 50)'/%3E%3C/svg%3E");
      background-size: 150px 150px;
      animation: moveBg 5s linear infinite;
    }

    [data-theme="light"] body {
      background-image: url("data:image/svg+xml,%3Csvg width='100' height='100' viewBox='0 0 100 100' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M50 30 L70 70 L30 70 Z' fill='none' stroke='%232563eb' stroke-width='0.6' stroke-opacity='0.25' transform='rotate(45 50 50)'/%3E%3C/svg%3E");
    }

    @keyframes moveBg {
      from {
        background-position: 150px 0;
      }

      to {
        background-position: 0 150px;
      }
    }

    .terminal-font {
      font-family: var(--font-mono);
      letter-spacing: -0.02em;
    }

    .glass-pill {
      background: color-mix(in srgb, var(--color-base-100), transparent 20%);
      backdrop-filter: blur(12px);
      border: 1px solid color-mix(in srgb, var(--color-primary), transparent 80%);
    }

    .cursor {
      display: inline-block;
      width: 8px;
      height: 1.1em;
      background-color: var(--color-primary);
      animation: blink 1.2s steps(2, start) infinite;
      vertical-align: middle;
      margin-left: 4px;
    }

    @keyframes blink {
      50% {
        opacity: 0;
      }
    }

    .dock-btn {
      @apply transition-colors duration-200 flex items-center justify-center px-4;
    }

    .dock-btn:hover {
      background-color: var(--color-primary) !important;
      color: var(--color-base-100) !important;
    }
  </style>
</head>

<body class="min-h-screen flex flex-col items-center justify-center p-8 overflow-hidden transition-colors duration-500">
  <header class="text-center mb-16 z-10 animate-in fade-in slide-in-from-bottom-2 duration-700">
    <h1 class="text-5xl md:text-7xl font-extrabold tracking-tighter mb-4 text-base-content">
      Yasasvi Gumma
    </h1>
    <p class="text-primary font-mono text-xs md:text-sm tracking-[0.4em] uppercase opacity-90">
      Software Engineer &bull; Full-Stack Developer
    </p>
  </header>

  <main class="max-w-4xl w-full z-10" x-data="{ 
      fullText: 'Portfolio redesign in progress. Upgrading systems and optimizing backend performance. Access to professional documentation and the resume is provided via the navigation menu below.', 
      displayText: '', 
      index: 0,
      init() {
        setTimeout(() => {
          let timer = setInterval(() => {
            if (this.index < this.fullText.length) {
              this.displayText += this.fullText[this.index];
              this.index++;
            } else { clearInterval(timer); }
          }, 25);
        }, 800);
      }
    }">
    <div
      class="terminal-font text-lg md:text-xl font-light leading-relaxed text-base-content/80 text-center md:text-left py-2 italic">
      <span class="text-primary font-bold not-italic">yasasvi</span><span
        class="text-base-content/40 not-italic">@</span><span class="text-primary/70 not-italic">portfolio</span><span
        class="text-base-content/40 not-italic">:~$</span>
      <span x-text="displayText"></span><span class="cursor not-italic"></span>
    </div>
  </main>

  <nav
    class="fixed bottom-10 left-1/2 -translate-x-1/2 flex items-center gap-3 p-2 px-4 rounded-full glass-pill shadow-xl z-50">
    <div class="dropdown dropdown-top dropdown-center">
      <button tabindex="0" class="btn btn-ghost dock-btn gap-2 rounded-full">
        <span class="material-symbols-outlined text-2xl">settings</span>
        <span class="text-sm font-semibold uppercase tracking-wider">Settings</span>
      </button>
      <ul tabindex="0"
        class="dropdown-content menu bg-neutral rounded-2xl z-50 w-64 p-4 shadow-2xl mb-8 border border-primary/10">
        <li class="menu-title text-primary text-[10px] font-mono uppercase tracking-[0.2em] mb-3">
          Preferences
        </li>
        <li>
          <label
            class="flex justify-between items-center py-3 cursor-pointer hover:bg-primary/10 rounded-xl px-3 transition-colors">
            <span class="flex items-center gap-3 text-sm font-semibold text-base-content">
              <span class="material-symbols-outlined text-xl" x-text="darkMode ? 'dark_mode' : 'light_mode'"></span>
              Theme
            </span>
            <input type="checkbox" class="toggle toggle-primary toggle-sm" x-model="darkMode" />
          </label>
        </li>

        <div class="sm:hidden border-t border-base-content/10 mt-3 pt-3">
          <li class="menu-title text-base-content/40 text-[10px] uppercase tracking-tighter mb-2">
            Connect
          </li>
          <li>
            <a href="https://github.com/MementoMori11723"
              class="py-3 text-sm font-medium hover:bg-primary/10 rounded-xl px-3"><span
                class="material-symbols-outlined mr-2">code</span>
              GitHub</a>
          </li>
          <li>
            <a href="mailto:mail@yasasvi.site"
              class="py-3 text-sm font-medium hover:bg-primary/10 rounded-xl px-3"><span
                class="material-symbols-outlined mr-2">mail</span>
              Contact</a>
          </li>
          <li>
            <a href="../assets/files/yasasvi-gumma.pdf"
              class="py-3 text-sm font-medium hover:bg-primary/10 rounded-xl px-3"><span
                class="material-symbols-outlined mr-2">description</span>
              Resume
            </a>
          </li>
        </div>
      </ul>
    </div>

    <div class="divider divider-horizontal mx-0 opacity-30 hidden sm:flex"></div>

    <a href="https://github.com/MementoMori11723" target="_blank"
      class="btn btn-ghost btn-circle hidden sm:flex dock-btn" title="GitHub">
      <span class="material-symbols-outlined text-2xl">code</span>
    </a>

    <a href="mailto:mail@yasasvi.site" class="btn btn-ghost btn-circle hidden sm:flex dock-btn" title="Email ">
      <span class="material-symbols-outlined text-2xl">mail</span>
    </a>

    <a href="../assets/files/yasasvi-gumma.pdf" target="_blank" class="btn btn-ghost btn-circle hidden sm:flex dock-btn"
      title="View Resume ">
      <span class="material-symbols-outlined text-2xl">description</span>
    </a>
  </nav>
</body>

</html>
