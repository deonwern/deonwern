<!doctype html>
<html lang="en" data-theme="yasasvi-theme">
  <head>
    <meta charset="UTF-8" />
    <meta name="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="" />

    <title>Yasasvi's portfolio</title>

    <link rel="dns-prefetch" href="https://fonts.googleapis.com" />
    <link rel="dns-prefetch" href="https://fonts.gstatic.com" crossorigin />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Arvo:ital,wght@0,400;0,700;1,400;1,700&display=swap"
      rel="stylesheet"
      media="all"
    />

    <link
      rel="prefetch"
      type="image/webp"
      href="/assets/img/favicon-small.webp"
      as="icon"
    />
    <link rel="icon" type="image/webp" href="/assets/img/favicon-small.webp" />

    <!-- Daisy Ui -->
    <link
      href="https://cdn.jsdelivr.net/npm/daisyui@5"
      rel="stylesheet"
      type="text/css"
    />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- Alpine.js -->
    <script
      defer
      src="https://cdn.jsdelivr.net/npm/alpinejs@3.14.8/dist/cdn.min.js"
    ></script>

    <!-- Tabler icons -->
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/dist/tabler-icons.min.css"
    />

    <!-- custom code -->
    <style>
      :root {
        font-family: Arvo, monospace;
        font-size: 1.2rem;
        scroll-behavior: smooth;
        scroll-padding: 16%;
      }

      :root:has(input.theme-controller[value="yasasvi-theme"]:checked),
      [data-theme="yasasvi-theme"] {
        color-scheme: "dark";
        --color-base-100: #1a1a1a;
        --color-base-content: white;
        --color-base-200: color-mix(in srgb, #1a1a1a, white 5%);
        --color-base-300: color-mix(in srgb, white, #1a1a1a 85%);
        --color-primary: #43fa96;
        --color-primary-content: #1a1a1a;
        --color-secondary: gray;
        --color-secondary-content: white;
        --color-accent: gray;
        --color-accent-content: white;
        --radius-selector: 0.3rem;
        --radius-field: 0.3rem;
        --radius-box: 0.3rem;
        --border: 1px;
      }
    </style>
  </head>

  <body>
    <nav class="navbar bg-base-100 shadow-sm text-lg">
      <div class="flex-1">
        <a class="btn btn-ghost" href="/#">
          <span class="p-0">&lt;</span>
          <span>Yasasvi Gumma</span>
          <span class="p-0">/&gt;</span>
        </a>
      </div>
      <div class="flex-none">
        <ul class="menu menu-horizontal px-1">
          {{template "page-links" .}}
        </ul>
      </div>
    </nav>
    <main class="container">{{template "content" .}}</main>
    <footer
      class="footer sm:footer-horizontal bg-neutral text-neutral-content items-center p-4"
    >
      <aside class="grid-flow-col items-center" x-data="{date: new Date()}">
        <p
          class="copyright"
          x-text="'Copyright &copy;' + date.getFullYear() + ' yasasvi.duet.ink - All Rights Reserved.'"
        ></p>
      </aside>
      <nav class="grid-flow-col gap-4 md:place-self-center md:justify-self-end">
        {{template "social-links" .}}
      </nav>
    </footer>
  </body>
</html>

<!-- page-links -->
{{define "page-links"}}
<li><a href="/#hero">Home</a></li>
<li><a href="/#about">about</a></li>
<li><a href="/#skills">skills</a></li>
<li><a href="/#experience">experience</a></li>
<li><a href="/#projects">projects</a></li>
<li><a href="/#contact">contact</a></li>
{{end}}

<!-- social-links -->
{{define "social-links"}}
<a href="mailto:contact@yasasvi.site">
  <i class="ti ti-mail"></i>
  <span>Email</span>
</a>
<a href="https://www.linkedin.com/in/yasasvi-gumma/">
  <i class="ti ti-brand-linkedin"></i>
  <span>Linkedin</span>
</a>
<a href="https://github.com/MementoMori11723">
  <i class="ti ti-brand-github"></i>
  <span>Github</span>
</a>
{{end}}
